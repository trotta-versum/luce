<section class="section" id="documenti">
  <p class="section-eyebrow">07 · Documenti</p>

  <h2 class="section-title">
    Gestione <em>Documentale</em>
  </h2>

  <p style="font-size:13px;color:#666;margin-bottom:20px;">
    Carica un PDF. Il sistema proverà a leggere il testo e preparare i dati per la dashboard.
  </p>

  <input type="file" id="fileUpload" accept="application/pdf" />

  <div id="fileList" style="margin-top:20px;">
    Nessun documento caricato
  </div>

  <div style="margin-top:30px;">
    <h3>Testo estratto</h3>

    <textarea
      id="extractedText"
      style="width:100%;min-height:180px;padding:12px;"
      placeholder="Qui comparirà il testo estratto dal PDF..."
    ></textarea>
  </div>

  <div style="margin-top:30px;display:grid;grid-template-columns:1fr 1fr;gap:16px;">

    <div>
      <label>Tipo documento</label>
      <input id="docType" style="width:100%;padding:10px;">
    </div>

    <div>
      <label>Fornitore / Persona</label>
      <input id="docSubject" style="width:100%;padding:10px;">
    </div>

    <div>
      <label>Importo (€)</label>
      <input id="docAmount" type="number" style="width:100%;padding:10px;">
    </div>

    <div>
      <label>OR / Task</label>
      <input id="docOR" style="width:100%;padding:10px;">
    </div>

  </div>

  <button
    id="applyDocData"
    style="margin-top:20px;padding:12px 18px;background:#0d6985;color:white;border:none;border-radius:6px;"
  >
    Applica alla Dashboard
  </button>

  <div id="updateStatus" style="margin-top:15px;"></div>

</section>
