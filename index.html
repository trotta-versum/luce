<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

  const KB_KEY = "luceKnowledgeBase";
  let kbDocs = JSON.parse(localStorage.getItem(KB_KEY) || "[]");

  function saveKb() {
    localStorage.setItem(KB_KEY, JSON.stringify(kbDocs));
  }

  async function extractPdfText(file) {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let text = "";

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(" ") + "\n";
    }

    return text;
  }

  function renderKbList() {
    const list = document.getElementById("kbList");
    if (!list) return;

    if (kbDocs.length === 0) {
      list.innerHTML = "<p>Nessun documento caricato.</p>";
      return;
    }

    list.innerHTML = kbDocs.map(doc => `
      <div class="metric">
        <span class="metric-val accent" style="font-size:16px">${doc.title}</span>
        <span class="metric-lbl">${doc.type}</span>
        <p class="metric-sub">${doc.date}</p>
        <p class="metric-sub">${doc.text.length.toLocaleString()} caratteri estratti</p>
        <button onclick="deleteKbDoc('${doc.id}')" class="preset-btn">Elimina</button>
      </div>
    `).join("");
  }

  function deleteKbDoc(id) {
    kbDocs = kbDocs.filter(doc => doc.id !== id);
    saveKb();
    renderKbList();
    const results = document.getElementById("kbResults");
    if (results) results.innerHTML = "";
  }

  const kbUpload = document.getElementById("kbUpload");

  if (kbUpload) {
    kbUpload.addEventListener("change", async function (e) {
      const files = Array.from(e.target.files);

      for (const file of files) {
        const text = await extractPdfText(file);

        kbDocs.push({
          id: Date.now() + "-" + Math.random().toString(16).slice(2),
          title: file.name.replace(".pdf", ""),
          fileName: file.name,
          type: "Relazione / Deliverable",
          date: new Date().toLocaleDateString("it-IT"),
          text: text
        });
      }

      saveKb();
      renderKbList();
      alert("Documento caricato e indicizzato.");
    });
  }

  const kbSearch = document.getElementById("kbSearch");

  if (kbSearch) {
    kbSearch.addEventListener("input", function (e) {
      const query = e.target.value.toLowerCase().trim();
      const resultsBox = document.getElementById("kbResults");

      if (!query) {
        resultsBox.innerHTML = "";
        return;
      }

      const results = kbDocs
        .filter(doc => doc.text.toLowerCase().includes(query))
        .map(doc => {
          const index = doc.text.toLowerCase().indexOf(query);
          const extract = doc.text.substring(Math.max(0, index - 120), index + 220);

          return `
            <div class="callout" style="margin-top:12px">
              <strong>${doc.title}</strong><br>
              <span style="font-size:12px;color:var(--ink-light)">
                ${doc.type} · ${doc.date}
              </span>
              <p style="margin-top:8px">
                ${extract.replace(new RegExp(query, "gi"), "<mark>$&</mark>")}...
              </p>
            </div>
          `;
        });

      resultsBox.innerHTML = results.length
        ? results.join("")
        : "<p>Nessun risultato trovato.</p>";
    });
  }

  renderKbList();
</script>
